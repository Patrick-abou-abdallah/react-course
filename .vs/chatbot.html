<!DOCTYPE html>
<html>
  <head>
    <title>Chat Bot</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
      }
      .send-button{
        background-color: green;
        color: whitesmoke;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;

      }
      .chat-input{
        padding:12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;

      }
      .app-container{
        display: flex;
        flex-direction: column;
        max-width: 600px;
        height:100vh;
        margin-left:auto;
        margin-right: auto;
      }
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      }
      .chat-message-text{
        display: flex;
        background-color: rgb(238,238,238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;

      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
   
    <script src="React-Course/v17/Scripts/scrpit-react.js"></script>
    <script src="React-Course/v17/Scripts/script-react-dom.js"></script>
    <script src = "React-Course/v17/Scripts/chatbot.js"></script>
    <script src="React-Course/v17/Scripts/script-babel.js"></script>
    <script src="React-Course/v17/Scripts/script-dayjs.js"></script>
    
    
    <script type="text/babel">
      
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);
 
        function saveInputText(event) {
          setInputText(event.target.value);
        }
 
        async function  sendMessage() {
         if (isLoading || inputText ==''){
          return
         }
         setIsLoading(true)

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
 
          setChatMessages(newChatMessages);
 
          const response =  await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              //message: response,
              message:response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
 
          setInputText('');
          setIsLoading(false)
        }
      
        function handelKeyDown (event){
          debugger;
        if(event.key === 'Enter')
        sendMessage();

        if (event.key == 'Escape'){
          setInputText('')
        }
      }
        return (
<div className="chat-input-container">
<input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown = {handelKeyDown}
              className="chat-input"
            />

              <button
              onClick={sendMessage}
              className='send-button'
              
>Send</button>
</div>
        );
      }
 
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;
 
        /*
        if (sender === 'robot') {
          return (
<div>
<img src="robot.png" width="50" />
              {message}
</div>
          );
        }
        */
 
        return (
<div className= { sender==='user'? 'chat-message-user':'chat-message-robot'}>
            {sender === 'robot' && (
<img src="React-Course/v17/Images/robot.png" className='chat-message-profile'/>
            )}
            <div className='chat-message-text'>
              {message}
            </div>
            
            {sender === 'user' && (
<img src="React-Course/v17/Images/user.png" className='chat-message-profile' />
            )}
</div>
        );
      }
 
      function ChatMessages({ chatMessages }) {
        const chatMessagesRef =  React.useRef(null)
        
        React.useEffect(()=>{
         const containerElem = chatMessagesRef.current;
         if(containerElem){
          containerElem.scrollTop = containerElem.scrollHeight
         }
        }, [chatMessages]);
        
        return (
                <div className= 'chat-messages-container' ref ={chatMessagesRef}>
                      {chatMessages.map((chatMessage) => {
                      return (
                            <ChatMessage
                          message={chatMessage.message}
                          sender={chatMessage.sender}
                          key={chatMessage.id}
                        />
                      );
                    })}
                </div>
        );
      }
 
      function App() {
        const [chatMessages, setChatMessages] = React.useState([{
          message: 'hello chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        }, {
          message: 'can you get me todays date?',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is September 27',
          sender: 'robot',
          id: 'id4'
        }]);
        // const [chatMessages, setChatMessages] = array;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];
 
        return (
<div className= 'app-container'>

            <ChatMessages
              chatMessages={chatMessages}
            />

            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
</div>
        );
      }
 
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
</script>

</html>
